<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let's UI Icons</title>
    <link rel="stylesheet" href="../dist/lets-ui-icons.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0f11;
        --surface: #18181b;
        --border: #27272a;
        --text: #fafafa;
        --muted: #71717a;
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --success: #22c55e;
        --radius: 10px;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 48px 24px;
      }

      header {
        max-width: 960px;
        margin: 0 auto 48px;
      }

      header h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
      }

      header p {
        color: var(--muted);
        font-size: 14px;
      }

      .controls {
        max-width: 960px;
        margin: 0 auto 32px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .search {
        flex: 1;
        min-width: 200px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 14px;
        padding: 9px 14px;
        outline: none;
        transition: border-color 0.15s;
      }

      .search::placeholder {
        color: var(--muted);
      }
      .search:focus {
        border-color: var(--accent);
      }

      .variant-toggle {
        display: flex;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .variant-toggle button {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        padding: 9px 16px;
        transition: all 0.15s;
      }

      .variant-toggle button.active {
        background: var(--accent);
        color: #fff;
      }

      .variant-toggle button:hover:not(.active) {
        color: var(--text);
      }

      .count {
        color: var(--muted);
        font-size: 13px;
        margin-left: auto;
      }

      .grid {
        max-width: 960px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px 16px 14px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          transform 0.1s;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        user-select: none;
      }

      .card:hover {
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      .card:active {
        transform: translateY(0);
      }

      .icon-preview {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
      }

      .icon-preview svg {
        width: 28px;
        height: 28px;
        fill: currentColor;
      }

      .icon-name {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card-actions {
        display: flex;
        gap: 6px;
        width: 100%;
      }

      .btn-copy {
        flex: 1;
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
        padding: 5px 0;
        transition: all 0.15s;
        letter-spacing: 0.3px;
      }

      .btn-copy:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
      }

      .btn-copy.copied {
        border-color: var(--success);
        color: var(--success);
      }

      .empty {
        grid-column: 1 / -1;
        text-align: center;
        color: var(--muted);
        padding: 64px 0;
        font-size: 14px;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 13px;
        padding: 10px 18px;
        opacity: 0;
        transition: all 0.2s ease;
        pointer-events: none;
        white-space: nowrap;
        z-index: 100;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Let's UI Icons</h1>
      <p>Click a button to copy the HTML snippet or SVG code.</p>
    </header>

    <div class="controls">
      <input
        class="search"
        type="search"
        placeholder="Search icons…"
        id="search"
        autocomplete="off"
      />
      <div class="variant-toggle">
        <button class="active" id="btn-outline" onclick="setVariant('outline')">
          Outline
        </button>
        <button id="btn-solid" onclick="setVariant('solid')">Solid</button>
      </div>
      <span class="count" id="count"></span>
    </div>

    <div class="grid" id="grid"></div>
    <div class="toast" id="toast"></div>

          outline: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 3C16.9706 3 21 7.02944 21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3ZM12 4.5C7.85786 4.5 4.5 7.85786 4.5 12C4.5 16.1421 7.85786 19.5 12 19.5C16.1421 19.5 19.5 16.1421 19.5 12C19.5 7.85786 16.1421 4.5 12 4.5ZM14.4697 8.46973C14.7626 8.17683 15.2374 8.17683 15.5303 8.46973C15.8232 8.76262 15.8232 9.23738 15.5303 9.53027L13.0605 12L15.5303 14.4697C15.8232 14.7626 15.8232 15.2374 15.5303 15.5303C15.2374 15.8232 14.7626 15.8232 14.4697 15.5303L12 13.0605L9.53027 15.5303C9.23738 15.8232 8.76262 15.8232 8.46973 15.5303C8.17683 15.2374 8.17683 14.7626 8.46973 14.4697L10.9395 12L8.46973 9.53027C8.17683 9.23738 8.17683 8.76262 8.46973 8.46973C8.76262 8.17683 9.23738 8.17683 9.53027 8.46973L12 10.9395L14.4697 8.46973Z"/></svg>`,
          solid: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 3C16.9706 3 21 7.02944 21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3ZM15.5303 8.46973C15.2374 8.17683 14.7626 8.17683 14.4697 8.46973L12 10.9395L9.53027 8.46973C9.23738 8.17683 8.76262 8.17683 8.46973 8.46973C8.17683 8.76262 8.17683 9.23738 8.46973 9.53027L10.9395 12L8.46973 14.4697C8.17683 14.7626 8.17683 15.2374 8.46973 15.5303C8.76262 15.8232 9.23738 15.8232 9.53027 15.5303L12 13.0605L14.4697 15.5303C14.7626 15.8232 15.2374 15.8232 15.5303 15.5303C15.8232 15.2374 15.8232 14.7626 15.5303 14.4697L13.0605 12L15.5303 9.53027C15.8232 9.23738 15.8232 8.76262 15.5303 8.46973Z"/></svg>`,
        },
      };

      let variant = 'outline';
      let query = '';
      let toastTimer = null;

      function setVariant(v) {
        variant = v;
        document
          .getElementById('btn-outline')
          .classList.toggle('active', v === 'outline');
        document
          .getElementById('btn-solid')
          .classList.toggle('active', v === 'solid');
        render();
      }

      function htmlSnippet(name) {
        if (variant === 'solid') return `<i class="lui-solid lui-${name}"></i>`;
        return `<i class="lui lui-${name}"></i>`;
      }

      function svgCode(name) {
        return ICONS[name][variant];
      }

      function copyText(text, btn, label) {
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          showToast(`${label} copied`);
          setTimeout(() => {
            btn.textContent = btn.dataset.label;
            btn.classList.remove('copied');
          }, 1500);
        });
      }

      function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
      }

      function render() {
        const grid = document.getElementById('grid');
        const names = Object.keys(ICONS).filter((n) => n.includes(query));

        document.getElementById('count').textContent = `${names.length} icons`;

        if (!names.length) {
          grid.innerHTML = `<div class="empty">No icons match "${query}"</div>`;
          return;
        }

        grid.innerHTML = names
          .map(
            (name) => `
    <div class="card">
      <div class="icon-preview">${ICONS[name][variant]}</div>
      <div class="icon-name">${name}</div>
      <div class="card-actions">
        <button class="btn-copy" data-label="HTML" onclick="copyText(htmlSnippet('${name}'), this, 'HTML')">HTML</button>
        <button class="btn-copy" data-label="SVG" onclick="copyText(svgCode('${name}'), this, 'SVG')">SVG</button>
      </div>
    </div>
  `
          )
          .join('');
      }

      document.getElementById('search').addEventListener('input', (e) => {
        query = e.target.value.trim().toLowerCase();
        render();
      });

      render();
    </script>
  </body>
</html>
